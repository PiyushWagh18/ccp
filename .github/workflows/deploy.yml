# ------------------------------------------------------------------
# CloudTask Manager - CI/CD Pipeline
# Automates testing and deployment to AWS EC2 via GitHub Actions.
# Triggered on every push to the main branch.
# ------------------------------------------------------------------

name: Deploy CloudTask Manager

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allows manual triggering from GitHub UI

env:
  AWS_REGION: eu-north-1
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================
  # JOB 1: Run tests
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run unit tests
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DYNAMODB_TABLE: CloudTasks
          S3_BUCKET: cloudtask-attachments-614939596951
          SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}
          LAMBDA_FUNCTION_NAME: cloud-task-processor
          CLOUDWATCH_LOG_GROUP: /cloudtask/application
        run: pytest tests/ -v

  # ============================================================
  # JOB 2: Deploy to EC2
  # ============================================================
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy application to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app

            # Pull latest code from the repository
            git pull origin main

            # Install updated dependencies
            pip3 install -r requirements.txt
            pip3 install -e .

            # Restart the application service
            sudo systemctl restart cloudtask

            echo "Deployment completed successfully."
